# PostgreSQL + Kafka (KRaft) + Debezium (Kafka Connect with Debezium connector).
# Start: docker compose up -d
# Register PostgreSQL connector via Kafka Connect REST API (port 8083).
# PostgreSQL requires wal_level=logical for CDC (set below).
# Kafka runs in KRaft mode (no Zookeeper).

services:
  kafka:
    image: apache/kafka:latest
    hostname: kafka
    container_name: kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:9093,PLAINTEXT_HOST://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9092"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 15s

  postgres:
    image: postgres:16-alpine
    hostname: postgres
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    command: ["postgres", "-c", "wal_level=logical"]
    volumes:
      - ./debezium/init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  debezium:
    image: debezium/connect:2.5
    hostname: debezium
    container_name: debezium
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: connect_configs
      STATUS_STORAGE_TOPIC: connect_statuses
      OFFSET_STORAGE_TOPIC: connect_offsets
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8083/connectors"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  register-connectors:
    image: curlimages/curl:latest
    depends_on:
      debezium:
        condition: service_healthy
    volumes:
      - ./debezium/connectors:/connectors:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        sleep 3
        register() {
          name=$1
          file=$2
          code=$(curl -s -o /tmp/body -w "%{http_code}" -X POST -H "Content-Type: application/json" --data @"$file" http://debezium:8083/connectors)
          if [ "$code" = "201" ] || [ "$code" = "200" ]; then
            echo "Connector $name created successfully (HTTP $code)"
          elif [ "$code" = "409" ]; then
            echo "Connector $name already exists (HTTP 409), skipping"
          else
            echo "Failed to create connector $name (HTTP $code)"
            cat /tmp/body
            exit 1
          fi
        }
        register onramp-orders /connectors/onramp-orders.json
        register executor-order-tasks /connectors/executor-order-tasks.json
        echo "All connectors registered successfully"
    restart: "no"

  onramp:
    build:
      context: .
      dockerfile: onramp/Dockerfile
    image: onramp:latest
    container_name: onramp
    hostname: onramp
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/onramp
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SECRET_KEY: change-me-in-production-min-32-bytes!!
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  executor:
    build:
      context: .
      dockerfile: executor/Dockerfile
    image: executor:latest
    container_name: executor
    hostname: executor
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      onramp:
        condition: service_started
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/executor
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      ORDER_SERVICE_URL: http://onramp:8000
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  webhook:
    build:
      context: .
      dockerfile: webhook/Dockerfile
    image: webhook:latest
    container_name: webhook
    hostname: webhook
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      onramp:
        condition: service_started
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/webhook
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      ORDER_SERVICE_URL: http://onramp:8000
      SECRET_KEY: change-me-in-production-min-32-bytes!!
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
